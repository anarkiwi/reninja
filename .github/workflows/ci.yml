name: roundtrip

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Official Kick Assembler distribution (latest stable). The vendor does not
  # publish stable version-pinned URLs; override KICKASS_URL here if you need a
  # specific build. The archive contains KickAss.jar.
  KICKASS_URL: "http://theweb.dk/KickAssembler/KickAssembler.zip"

jobs:
  roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Kick Assembler
        run: |
          curl -fL -o kickass.zip "$KICKASS_URL"
          mkdir -p "$HOME/kickass"
          unzip -o kickass.zip -d "$HOME/kickass" >/dev/null
          JAR="$(find "$HOME/kickass" -name 'KickAss.jar' | head -1)"
          test -n "$JAR" || { echo "KickAss.jar not found in archive"; exit 1; }
          echo "KICKASS_JAR=$JAR" >> "$GITHUB_ENV"
          java -jar "$JAR" -version || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Assemble + round-trip verify (pytest)
        run: python -m pytest -v

      - name: Upload rebuilt artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            build/lastninja.prg
            build/lastninja.sid
          if-no-files-found: ignore
          retention-days: 7
